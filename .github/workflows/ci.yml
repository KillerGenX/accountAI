name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  ci-pipeline:
    name: CI Pipeline (Lint, Typecheck & Build)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Node/Next.js Frontend Build Verification ---
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Workspace Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Frontend Build Compilation
        run: pnpm --filter web build

      # --- Python Backend Verification ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Linters & Formatters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Lint Backend Code (Ruff)
        run: ruff check services/api-gateway/src workers/company-research/src --ignore E501

      - name: Check Backend Formatting (Black)
        run: black --check services/api-gateway/src workers/company-research/src
